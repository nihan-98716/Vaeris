name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend CI (Lint & Test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Black Formatter Check
        run: black --check backend

      - name: Run Ruff Linter Check
        run: ruff check backend

      - name: Run Tests
        run: pytest backend

  frontend:
    name: Frontend CI (Lint & Build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          # Fallback to standard npm install if package-lock.json doesn't exist yet
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run ESlint Check
        run: |
          cd frontend
          npm run lint

      - name: Build Application
        run: |
          cd frontend
          npm run build
